<h1 style="text-align: center;">counter app</h1>

<div>
  <h2 style="text-align: center;">{{count}}</h2>

  <div>
    <button class="btn red-btn" (click)="HandleCounter('minus')">Decrement</button>
    <button class="btn black-btn" (click)="HandleCounter('')">Reset</button>
    <button class="btn green" (click)="HandleCounter('plus')">Increment</button>
  </div>
</div>
